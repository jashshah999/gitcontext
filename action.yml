name: 'gitcontext'
description: 'Auto-generate AI context docs (CLAUDE.md / AGENTS.md) for your codebase'
author: 'jashshah999'

branding:
  icon: 'file-text'
  color: 'purple'

inputs:
  deep:
    description: 'Enable deep mode (requires ANTHROPIC_API_KEY or GEMINI_API_KEY)'
    required: false
    default: 'false'
  output:
    description: 'Output file path'
    required: false
    default: 'CLAUDE.md'
  commit:
    description: 'Commit and push the output file if it changed'
    required: false
    default: 'false'
  path:
    description: 'Path to the repository to analyze'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install gitcontext
      shell: bash
      run: |
        if [ "${{ inputs.deep }}" = "true" ]; then
          pip install 'gitcontext[all]'
        else
          pip install gitcontext
        fi

    - name: Run gitcontext
      shell: bash
      run: |
        ARGS="${{ inputs.path }} --output ${{ inputs.output }}"
        if [ "${{ inputs.deep }}" = "true" ]; then
          ARGS="$ARGS --deep"
        fi
        gitcontext $ARGS

    - name: Commit and push
      if: inputs.commit == 'true'
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add ${{ inputs.output }}
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "docs: update ${{ inputs.output }} via gitcontext"
          git push
        fi
